services:
  {{ Self::service_name() }}:
    image: docker.verbis.dkfz.de/cache/samply/focus:{{ tag }}
    environment:
      BEAM_APP_ID_LONG: {{ beam.id }}
      BEAM_PROXY_URL: {{ beam.url }}
    {%- if let Some(endpoint_url) = endpoint_url %}
      ENDPOINT_URL: {{ endpoint_url }}fhir/
    {%- endif %}
      API_KEY: "{{ beam.secret }}"
      RETRY_COUNT: 128
      EPSILON: 0.28
      ENDPOINT_TYPE: {{ endpoint_type }}
    {%- if let Some((exporter_url, exporter_api_key)) = exporter %}
      EXPORTER_URL: "{{ exporter_url }}"
      EXPORTER_API_KEY: "{{ exporter_api_key }}"
    {%- endif %}
    {%- if let Some((provider, provider_icon)) = provider_data %}
      PROVIDER: "{{ provider }}"
      PROVIDER_ICON: "{{ provider_icon }}"
    {%- endif %}
    {%- if let Some(auth_header) = auth_header %}
      AUTH_HEADER: {{ auth_header }}
    {%- endif %}
    {%- if let Some(postgres_connection_string) = postgres_connection_string %}
      POSTGRES_CONNECTION_STRING: {{ postgres_connection_string }}
    {%- endif %}

